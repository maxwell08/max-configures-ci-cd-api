name: CI/CD DEV Deployment

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
      - dev
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Build
        run: mvn -B -ntp -DskipTests package

  deploy-dev:
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          cache: maven

      - name: Deploy to DEV
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        run: mvn -B -ntp -DskipTests deploy -DmuleDeploy
