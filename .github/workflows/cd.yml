name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
          server-id: anypoint-exchange-v2
          server-username: ANYPOINT_USERNAME
          server-password: ANYPOINT_PASSWORD

      - name: Validate deployment secrets
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        run: |
          [ -n "$ANYPOINT_USERNAME" ] && [ -n "$ANYPOINT_PASSWORD" ] || (echo "Required Anypoint credentials are not configured" && exit 1)

      - name: Deploy with Maven
        env:
          ANYPOINT_USERNAME: ${{ secrets.ANYPOINT_USERNAME }}
          ANYPOINT_PASSWORD: ${{ secrets.ANYPOINT_PASSWORD }}
        run: mvn -B -ntp deploy -DmuleDeploy
